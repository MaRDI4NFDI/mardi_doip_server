site_name: Mardi DOIP Server Docs
site_description: Strict DOIP server and client documentation
site_url: https://mardi4nfdi.github.io/mardi_doip_server/
use_directory_urls: true
docs_dir: content
site_dir: site

theme:
  name: shadcn

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: false

nav:
  - Home: index.md
  - Server: server.md
  - Server HTTP Gateway: server_http_gateway.md
  - Client: client.md
  - Client CLI: client_cli.md
  - Docker: docker.md
  - Configuration: configuration.md
  - Development: development.md
  - Project Layout: project_structure.md
  - Workflows:
      - Overview: workflows.md
      - System Preparation: workflows_preparation.md
      - Creating a Workflow FDO: workflows_create.md
      - Workflow Testing: workflows_testing.md
      - Executing a Workflow: workflows_execute.md
      - Example: workflow_example.md
